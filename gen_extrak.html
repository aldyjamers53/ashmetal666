<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk URL Extractor</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; max-width: 700px; margin: 0 auto; }
        h2 { color: #00ffcc; text-align: center; }
        textarea { width: 100%; height: 180px; background: #222; color: #fff; border: 1px solid #444; padding: 10px; box-sizing: border-box; font-family: monospace; }
        button { background: #00ffcc; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin: 15px 0; font-size: 16px; }
        button:hover { background: #00ccaa; }
        #output { color: #00ff00; }
    </style>
</head>
<body>

    <h2>🔗 BULK URL EXTRACTOR</h2>
    <p style="color:#aaa;">Tempel daftar link share (Dropbox, Cloudmail, dll) satu baris satu link:</p>
    <textarea id="inputUrls" placeholder="https://www.dropbox.com/scl/fi/..."></textarea>
    
    <button onclick="extractUrls()">⚡ EKSTRAK JADI LINK DIRECT STREAM</button>
    
    <p style="color:#aaa;">Hasil Link Bersih (Siap pakai untuk database):</p>
    <textarea id="output" readonly></textarea>

    <script>
        function extractUrls() {
            const text = document.getElementById('inputUrls').value;
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let extracted = [];

            lines.forEach(url => {
                let cleanUrl = url;
                // Ekstraksi Dropbox
                if (url.includes('dropbox.com')) {
                    cleanUrl = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '').replace('&dl=0', '');
                }
                // Ekstraksi Cloudmail (jika format share biasa)
                if (url.includes('cloud.mail.ru/public/')) {
                    // Catatan: Cloudmail membutuhkan struktur khusus atau direct link langsung
                }
                extracted.push(cleanUrl);
            });

            document.getElementById('output').value = extracted.join('\n');
        }
    </script>
</body>
</html>
