<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHMETAL666 Official Sitemap Generator</title>
    <style>
        /* ====================================================
           DESAIN & TEMA (Dark Mode)
           ==================================================== */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #ff3333; /* Warna merah metal */
            --accent-hover: #cc0000;
            --success-color: #00cc66;
            --border-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            border-top: 4px solid var(--accent-color);
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h1 span { color: var(--accent-color); }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #000;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .progress-bar {
            height: 20px;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        /* Statistik Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .stat-card h3 { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
        .stat-card p { font-size: 1.4rem; font-weight: bold; color: var(--text-color); }

        /* Log Proses */
        .log-area {
            background-color: #000;
            color: #0f0; /* Hijau terminal */
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        /* Tombol Aksi */
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }
        #btn-download, #btn-copy { background-color: var(--success-color); color: #000; }
        #btn-download:hover, #btn-copy:hover { background-color: #00994c; color: #fff; }

        /* Preview XML */
        .xml-preview {
            width: 100%;
            height: 350px;
            background-color: #111;
            color: #dcdcdc;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            font-family: monospace;
            resize: vertical;
            white-space: pre;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><span>ASHMETAL666</span> Official Sitemap Generator</h1>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Statistik -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Database Terbaca</h3>
            <p id="stat-db">0 / 10</p>
        </div>
        <div class="stat-card">
            <h3>Total Lagu Valid</h3>
            <p id="stat-songs">0</p>
        </div>
        <div class="stat-card">
            <h3>Total URL</h3>
            <p id="stat-urls">0</p>
        </div>
        <div class="stat-card">
            <h3>Ukuran Sitemap</h3>
            <p id="stat-size">0 KB</p>
        </div>
        <div class="stat-card">
            <h3>Tanggal Dibuat</h3>
            <p id="stat-date">-</p>
        </div>
    </div>

    <!-- Log Proses -->
    <div class="log-area" id="log-console">
        [*] Sistem siap. Klik "Generate Sitemap" untuk memproses database 1-10.
    </div>

    <!-- Tombol Aksi -->
    <div class="actions">
        <button id="btn-generate" onclick="generateSitemap()">Generate Sitemap</button>
        <button id="btn-copy" onclick="copyXML()" disabled>Copy XML</button>
        <button id="btn-download" onclick="downloadXML()" disabled>Download sitemap.xml</button>
    </div>

    <!-- Preview XML -->
    <textarea class="xml-preview" id="xml-preview" readonly placeholder="Preview XML akan muncul di sini..."></textarea>
</div>

<!-- ====================================================
     JAVASCRIPT LOGIC
     ==================================================== -->
<script>
    // Konfigurasi Dasar
    const BASE_URL = 'https://ashmetal666.vercel.app';
    const DB_FILES = [
        'database.json', 'database2.json', 'database3.json', 'database4.json', 'database5.json',
        'database6.json', 'database7.json', 'database8.json', 'database9.json', 'database10.json'
    ];
    
    let generatedXML = ""; // Variabel global untuk menyimpan hasil XML

    // Halaman Statis berdasarkan spesifikasi
    const staticPages = [
        { url: BASE_URL + '/', priority: '1.0', changefreq: 'daily' },
        { url: BASE_URL + '/about.html', priority: '0.5' }, // Tidak ada changefreq spesifik
        { url: BASE_URL + '/request.html', priority: '0.6' } // Tidak ada changefreq spesifik
    ];

    /**
     * Fungsi untuk menambahkan log ke layar
     */
    function logMessage(msg) {
        const consoleEl = document.getElementById('log-console');
        const time = new Date().toLocaleTimeString('id-ID');
        consoleEl.innerHTML += `<div>[${time}] ${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight; // Auto scroll ke bawah
    }

    /**
     * Update lebar progress bar
     */
    function updateProgress(percent) {
        document.getElementById('progress-bar').style.width = percent + '%';
    }

    /**
     * Escape Karakter Khusus XML (Validasi GSC)
     */
    function escapeXML(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');
    }

    /**
     * Format Tanggal (YYYY-MM-DD)
     */
    function getTodayDate() {
        return new Date().toISOString().split('T')[0];
    }

    /**
     * Format Ukuran File (Bytes ke KB/MB)
     */
    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    /**
     * MEMBUAT SLUG OTOMATIS
     * Aturan: huruf kecil, hapus karakter aneh/kutip/titik/koma/kurung/simbol,
     * spasi jadi -, multi - jadi satu -, hapus - awal/akhir.
     */
    function generateSlug(artist, title) {
        // Gabungkan artist dan title
        let text = `${artist} ${title}`;
        
        text = text.toLowerCase();
        
        // Menghapus karakter non-ASCII dan simbol aneh (hanya sisakan a-z, 0-9, dan spasi)
        text = text.replace(/[^a-z0-9\s-]/g, '');
        
        // Ubah spasi menjadi tanda hubung (-)
        text = text.replace(/\s+/g, '-');
        
        // Hapus tanda hubung beruntun (misal: --- menjadi -)
        text = text.replace(/-+/g, '-');
        
        // Hapus tanda hubung di awal dan di akhir string
        text = text.replace(/^-+|-+$/g, '');
        
        return text;
    }

    /**
     * Fungsi Utama: Generate Sitemap
     */
    async function generateSitemap() {
        // Reset UI
        document.getElementById('btn-generate').disabled = true;
        document.getElementById('log-console').innerHTML = '';
        updateProgress(0);
        
        logMessage('Memulai proses membaca database...');
        
        let allData = [];
        let dbFoundCount = 0;

        // 1. Fetch semua database (1-10)
        for (let i = 0; i < DB_FILES.length; i++) {
            const file = DB_FILES[i];
            try {
                const response = await fetch(file);
                if (response.ok) {
                    const data = await response.json();
                    allData = allData.concat(data);
                    dbFoundCount++;
                    logMessage(`[OK] Membaca ${file}: +${data.length} lagu.`);
                } else {
                    logMessage(`[SKIP] ${file} tidak ditemukan (Status: ${response.status}).`);
                }
            } catch (error) {
                logMessage(`[SKIP] Gagal membaca ${file}: File tidak ada/error.`);
            }
            // Update progress bar saat membaca file
            updateProgress(((i + 1) / DB_FILES.length) * 50);
        }

        document.getElementById('stat-db').innerText = `${dbFoundCount} / 10`;

        if (allData.length === 0) {
            logMessage('[ERROR] Tidak ada data yang berhasil dibaca dari seluruh database.');
            document.getElementById('btn-generate').disabled = false;
            return;
        }

        logMessage(`Total raw data terkumpul: ${allData.length} item. Memproses validasi...`);

        // 2. Validasi, Filter Kosong, dan Buat URL
        let uniqueUrls = new Set();
        let validSongs = [];

        allData.forEach(item => {
            // Jika artist atau title kosong, LEWATI DATA
            if (!item.artist || item.artist.trim() === '' || !item.title || item.title.trim() === '') {
                return; 
            }

            // Bersihkan spasi berlebih
            const cleanArtist = item.artist.trim();
            const cleanTitle = item.title.trim();

            // Generate Slug
            const slug = generateSlug(cleanArtist, cleanTitle);
            
            // Format URL: /play?id=slug
            const url = `${BASE_URL}/play?id=${slug}`;

            // Hapus Duplikat URL
            if (!uniqueUrls.has(url)) {
                uniqueUrls.add(url);
                validSongs.push({
                    artist: cleanArtist,
                    title: cleanTitle,
                    url: escapeXML(url)
                });
            }
        });
        
        updateProgress(70);

        // 3. Urutkan berdasarkan Artist, kemudian Title
        logMessage(`Mengurutkan ${validSongs.length} lagu berdasarkan Artist -> Title...`);
        validSongs.sort((a, b) => {
            const artistCompare = a.artist.localeCompare(b.artist);
            if (artistCompare !== 0) return artistCompare;
            return a.title.localeCompare(b.title);
        });

        // 4. Bangun string XML
        logMessage('Menyusun format XML Google Sitemap...');
        const today = getTodayDate();
        
        let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
        xml += `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;

        // Tambah Halaman Statis
        staticPages.forEach(page => {
            xml += `  <url>\n`;
            xml += `    <loc>${escapeXML(page.url)}</loc>\n`;
            if (page.changefreq) xml += `    <changefreq>${page.changefreq}</changefreq>\n`;
            xml += `    <priority>${page.priority}</priority>\n`;
            xml += `  </url>\n`;
        });

        // Tambah Halaman Lagu
        validSongs.forEach(song => {
            xml += `  <url>\n`;
            xml += `    <loc>${song.url}</loc>\n`;
            xml += `    <lastmod>${today}</lastmod>\n`;
            xml += `    <changefreq>weekly</changefreq>\n`;
            xml += `    <priority>0.8</priority>\n`;
            xml += `  </url>\n`;
        });

        xml += `</urlset>`;
        
        generatedXML = xml;
        
        updateProgress(100);
        logMessage('[SELESAI] Sitemap berhasil dibuat!');

        // 5. Update Statistik & UI
        const blob = new Blob([xml], { type: 'application/xml' });
        
        document.getElementById('stat-songs').innerText = validSongs.length.toLocaleString('id-ID');
        document.getElementById('stat-urls').innerText = (validSongs.length + staticPages.length).toLocaleString('id-ID');
        document.getElementById('stat-size').innerText = formatBytes(blob.size);
        document.getElementById('stat-date').innerText = today;
        
        document.getElementById('xml-preview').value = xml;

        // Aktifkan tombol
        document.getElementById('btn-copy').disabled = false;
        document.getElementById('btn-download').disabled = false;
        document.getElementById('btn-generate').disabled = false;
    }

    /**
     * Fungsi Copy XML ke Clipboard
     */
    function copyXML() {
        const text = document.getElementById('xml-preview').value;
        navigator.clipboard.writeText(text).then(() => {
            alert('Kode XML Sitemap berhasil disalin ke clipboard!');
        }).catch(err => {
            alert('Gagal menyalin: ' + err);
        });
    }

    /**
     * Fungsi Download sitemap.xml
     */
    function downloadXML() {
        if (!generatedXML) return;
        
        const blob = new Blob([generatedXML], { type: 'application/xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sitemap.xml';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
