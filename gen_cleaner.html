<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHMETAL666 - URL Cleaner & Mass Gen</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        h2 { color: #ff3333; text-align: center; font-weight: bold; }
        .box { background: #1a1a1a; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; box-sizing: border-box; border-radius: 4px; }
        textarea { height: 180px; font-family: monospace; }
        button { background: #ff3333; color: #fff; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; border-radius: 4px; }
        button:hover { background: #cc0000; }
        .btn-copy { background: #00ffcc; color: #000; margin-top: 10px; }
        .btn-copy:hover { background: #00ccaa; }
        #output { color: #00ff00; height: 250px; }
    </style>
</head>
<body>

    <h2>🧹 ASHMETAL666 URL CLEANER & MASS GENERATOR</h2>

    <!-- INFO ALBUM GLOBAL -->
    <div class="box">
        <p style="margin-top:0; color:#aaa; font-weight:bold;">1. Tag Info Album Baru</p>
        <div class="row">
            <input type="text" id="album" placeholder="Nama Album (Contoh: Waking The Fallen)">
            <input type="text" id="artist" placeholder="Nama Artis / Band (Contoh: Avenged Sevenfold)">
        </div>
        <input type="text" id="img" placeholder="URL Link Gambar Cover (Contoh: https://www.metal-archives.com/...)">
    </div>

    <!-- INPUT DATA KOTOR -->
    <div class="box">
        <p style="margin-top:0; color:#aaa; font-weight:bold;">2. Tempel Data Kotor Hasil Ekstensi (CSV) di Sini</p>
        <textarea id="dirtyData" placeholder="Tempel langsung semua teks hasil ekstensi yang masih kotor di sini..."></textarea>
    </div>

    <button onclick="cleanAndGenerate()">🔥 BERSIHKAN & GENERATE JSON MASSAL</button>

    <!-- HASIL OUTPUT SCRIPT -->
    <div class="box" style="margin-top:15px;">
        <p style="margin-top:0; color:#aaa; font-weight:bold;">3. Hasil Potongan Script JSON (Tinggal Copy & Paste ke GitHub)</p>
        <textarea id="output" readonly placeholder="Hasil potongan database yang sudah pas akan muncul di sini..."></textarea>
        
        <!-- TOMBOL COPY MANDIRI -->
        <button onclick="copyToClipboard()" class="btn-copy" id="btnCopy">📋 SALIN SCRIPT JSON</button>
    </div>

    <script>
        function parseCSVLine(text) {
            let r = [""];
            let insideQuote = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') {
                    insideQuote = !insideQuote;
                } else if (c === ',' && !insideQuote) {
                    r.push("");
                } else {
                    r[r.length - 1] += c;
                }
            }
            return r;
        }

        function cleanAndGenerate() {
            const albumName = document.getElementById('album').value || "";
            const artistName = document.getElementById('artist').value || "";
            const imgUrl = document.getElementById('img').value.trim();
            const dirtyText = document.getElementById('dirtyData').value;

            const lines = dirtyText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let resultObjects = [];

            lines.forEach(line => {
                if (line.startsWith('URL,Title') || line.includes('?src=shmodel')) return;

                const columns = parseCSVLine(line);
                
                if (columns.length >= 2) {
                    let originalUrl = columns[0].trim();
                    let title = columns[1].trim();
                    
                    if (originalUrl.includes('.mp3')) {
                        let directUrl = originalUrl
                            .replace('www.dropbox.com', 'dl.dropboxusercontent.com')
                            .replace('dl=0', 'raw=1');

                        title = title
                            .replace(/\.mp3$/i, '')
                            .replace(/[-_]/g, ' ')
                            .replace(new RegExp(artistName, 'gi'), '')
                            .trim();
                        
                        resultObjects.push({
                            "src": directUrl,
                            "title": title,
                            "artist": artistName,
                            "album": albumName,
                            "img": imgUrl
                        });
                    }
                }
            });

            if (resultObjects.length === 0) {
                alert('Format data kotor tidak cocok atau tidak ditemukan file MP3!');
                return;
            }

            let jsonString = JSON.stringify(resultObjects, null, 2);
            
            if (jsonString.startsWith('[')) jsonString = jsonString.substring(1);
            if (jsonString.endsWith(']')) jsonString = jsonString.substring(0, jsonString.length - 1);

            document.getElementById('output').value = jsonString.trim();
            
            // Reset text tombol salin jika generate ulang
            document.getElementById('btnCopy').innerText = "📋 SALIN SCRIPT JSON";
            alert(`Sukses! ${resultObjects.length} data lagu dikonversi secara presisi.`);
        }

        // FUNGSI COPY MASSAL OTOMATIS
        function copyToClipboard() {
            const outputText = document.getElementById('output');
            if (!outputText.value) {
                alert('Belum ada data yang di-generate untuk disalin!');
                return;
            }
            
            outputText.select();
            outputText.setSelectionRange(0, 99999); // Untuk perangkat HP/Mobile
            
            navigator.clipboard.writeText(outputText.value).then(() => {
                const btn = document.getElementById('btnCopy');
                btn.innerText = "✅ SCRIPT BERHASIL DISALIN!";
                setTimeout(() => {
                    btn.innerText = "📋 SALIN SCRIPT JSON";
                }, 3000);
            }).catch(() => {
                alert('Gagal menyalin otomatis, silakan blok teks manual.');
            });
        }
    </script>
</body>
</html>
