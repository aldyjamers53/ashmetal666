<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHMETAL666 - JSON Admin Generator</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; color: #c00000; font-weight: bold;}
        input[type="text"] { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; border-radius: 4px;}
        input[type="text"]:focus { border-color: #c00000; outline: none; }
        button { background: #c00000; color: #fff; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; margin-right: 10px; border-radius: 4px;}
        button:hover { background: #e60000; }
        button.reset { background: #444; }
        button.reset:hover { background: #555; }
        textarea { width: 100%; height: 140px; background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 10px; margin-top: 20px; box-sizing: border-box; border: 1px solid #333; border-radius: 4px; resize: none;}
        .hint { font-size: 11px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>

    <h2>ASHMETAL666 AUTO ENTRY GENERATOR</h2>
    <hr style="border: 1px solid #c00000;">
    <br>

    <div class="form-group">
        <label>1. URL MP3 Dropbox</label>
        <input type="text" id="src" placeholder="https://www.dropbox.com/..." oninput="autoExtractData()">
        <div class="hint">Tempel link Dropbox, data di bawah langsung terisi otomatis dan domain langsung dikonversi aman.</div>
    </div>
    <div class="form-group">
        <label>Nama Band</label>
        <input type="text" id="artist" placeholder="Terisi otomatis...">
    </div>
    <div class="form-group">
        <label>Judul Lagu</label>
        <input type="text" id="title" placeholder="Terisi otomatis...">
    </div>
    <div class="form-group">
        <label>URL Thumbnail Gambar</label>
        <input type="text" id="img" placeholder="Masukkan URL gambar manual atau gunakan auto-pola...">
    </div>

    <div style="margin-top:15px;">
        <button onclick="generateJSON()">Generate JSON</button>
        <button class="reset" onclick="resetForm()">Reset Form</button>
    </div>

    <textarea id="output" readonly placeholder="Hasil format JSON akan muncul di sini..."></textarea>
    <br><br>
    <button onclick="copyJSON()" style="background:#0088cc; width: 100%;">Copy JSON</button>

    <script>
        function autoExtractData() {
            let srcInput = document.getElementById('src').value.trim();
            if (!srcInput) return;

            try {
                const urlClean = srcInput.split('?')[0];
                const fileNameWithExt = urlClean.substring(urlClean.lastIndexOf('/') + 1);
                let fileName = decodeURIComponent(fileNameWithExt.replace(/\+/g, ' ')).replace(/\.mp3$/i, '');

                let artist = "";
                let title = "";

                if (fileName.includes('-')) {
                    const parts = fileName.split('-');
                    artist = parts[0].trim();
                    title = parts.slice(1).join('-').trim();
                } else if (fileName.includes('_')) {
                    const parts = fileName.split('_');
                    artist = parts[0].trim();
                    title = parts.slice(1).join(' ').trim();
                } else {
                    title = fileName;
                }

                artist = artist.replace(/_/g, ' ');
                title = title.replace(/_/g, ' ');

                document.getElementById('artist').value = artist;
                document.getElementById('title').value = title;

                // Set fallback pola lama jika user belum input thumbnail gambar
                const imgFormat = title.replace(/\s+/g, '_');
                document.getElementById('img').value = `http://zonalagu.jw.lt/img/${imgFormat}.jpg`;
            } catch (e) {
                console.error("Gagal parse nama file otomatis:", e);
            }
        }

        function generateJSON() {
            let src = document.getElementById('src').value.trim();
            const title = document.getElementById('title').value.trim();
            const artist = document.getElementById('artist').value.trim();
            const img = document.getElementById('img').value.trim();

            if(!src || !title || !artist || !img) {
                alert('Semua bidang wajib diisi!');
                return;
            }

            // PERBAIKAN UTAMA: Mengubah domain www.dropbox.com menjadi dl.dropboxusercontent.com secara paksa
            if (src.includes('www.dropbox.com')) {
                src = src.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
            } else if (src.includes('dropbox.com') && !src.includes('dl.dropboxusercontent.com')) {
                src = src.replace('dropbox.com', 'dl.dropboxusercontent.com');
            }

            // Memastikan parameter di ujungnya adalah ?raw=1 agar bisa distreaming langsung
            if (src.includes('?')) {
                src = src.replace(/dl=0|dl=1/g, 'raw=1');
                if (!src.includes('raw=1')) src += '&raw=1';
            } else {
                src += '?raw=1';
            }

            const jsonObj = { src, title, artist, img };
            document.getElementById('output').value = JSON.stringify(jsonObj, null, 2) + ",";
        }

        function resetForm() {
            document.getElementById('src').value = '';
            document.getElementById('title').value = '';
            document.getElementById('artist').value = '';
            document.getElementById('img').value = '';
            document.getElementById('output').value = '';
        }

        function copyJSON() {
            const output = document.getElementById('output');
            if(!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Format teks JSON berhasil disalin!');
        }
    </script>
</body>
</html>
